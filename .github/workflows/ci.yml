name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: self-hosted
    timeout-minutes: 60
    env:
      UV_CACHE_DIR: ${{ runner.temp }}/uv-cache
      UV_LINK_MODE: copy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run --dev ruff check .

      - name: Type check
        run: uv run --dev mypy

      - name: Test
        run: uv run --dev pytest -q
