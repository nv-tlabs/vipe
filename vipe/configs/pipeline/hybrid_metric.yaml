# Hybrid Metric Depth Pipeline Configuration
# Combines MoGe metric depth with GeometryCrafter temporal consistency

defaults:
  - default

# Override SLAM depth model with hybrid metric depth
slam:
  keyframe_depth: hybrid_metric
  optimize_intrinsics: ${neq:${..init.intrinsics},"gt"}

# Output configuration (inherit from default)
output:
  path: vipe_results_hybrid/
  save_artifacts: true
  save_slam_map: false
  save_viz: true
  viz_downsample: 2
  viz_attributes: [['rgb', 'instance'], ['depth', 'pcd']]

